spring.application.name=smartsalud

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/policlinico_vidasalud}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# update = ajusta tablas existentes sin destruir datos (creará password_hash en medico si falta)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# CORS — orígenes permitidos del frontend
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}

# Docker Compose desactivado: gestionamos Postgres manualmente con `docker compose up -d`
# Si no se desactiva, Spring Boot intenta auto-configurar el datasource y rompe la URL.
spring.docker.compose.enabled=false


# JWT Configuration
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}


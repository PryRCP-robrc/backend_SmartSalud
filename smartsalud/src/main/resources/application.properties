spring.application.name=smartsalud

# Conexión automática mediante Docker Compose
spring.datasource.url=jdbc:postgresql://localhost:5433/smartsalud
spring.datasource.username=postgres
spring.datasource.password=admin

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ¡IMPORTANTE! Cambiamos a true para que Spring Boot levante el contenedor por ti
spring.docker.compose.enabled=false